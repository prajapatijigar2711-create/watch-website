<!DOCTYPE html>
<html>
<head>
    <title>Watch List - One Page XML</title>
    <meta charset="UTF-8">

<script>
function loadXML() {

    // XML Data inside JavaScript (No separate file needed)
    var xmlString = `
    <watches>
        <watch>
            <no>1</no>
            <type>Luxury</type>
            <price>2500</price>
        </watch>
        <watch>
            <no>2</no>
            <type>Sport</type>
            <price>1500</price>
        </watch>
        <watch>
            <no>3</no>
            <type>Smart</type>
            <price>1700</price>
        </watch>
        <watch>
            <no>4</no>
            <type>Analog</type>
            <price>2000</price>
        </watch>
        <watch>
            <no>5</no>
            <type>Classic</type>
            <price>1900</price>
        </watch>
    </watches>
    `;

    // Convert string to XML object
    var parser = new DOMParser();
    var xmlDoc = parser.parseFromString(xmlString, "text/xml");

    var table = "<tr><th>No</th><th>Type</th><th>Price</th></tr>";
    var x = xmlDoc.getElementsByTagName("watch");

    for (var i = 0; i < x.length; i++) {
        table += "<tr>";
        table += "<td>" + x[i].getElementsByTagName("no")[0].childNodes[0].nodeValue + "</td>";
        table += "<td>" + x[i].getElementsByTagName("type")[0].childNodes[0].nodeValue + "</td>";
        table += "<td>₹" + x[i].getElementsByTagName("price")[0].childNodes[0].nodeValue + "</td>";
        table += "</tr>";
    }

    document.getElementById("demo").innerHTML = table;
}
</script>

<style>
body{
    font-family: Arial;
    text-align:center;
    background-color:#f4f4f4;
}

table{
    margin:auto;
    border-collapse:collapse;
    width:50%;
    background-color:#d4edff;
}

th, td{
    border:1px solid black;
    padding:10px;
    font-size:18px;
}

th{
    background-color:orange;
}

h2{
    margin-top:30px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:20px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>Watch Collection</h2>

<button onclick="loadXML()">Load Watch Data</button>

<table id="demo"></table>

</body>
</html>
